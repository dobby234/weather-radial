<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js" charset="utf-8"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Weather Radial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        #radial-chart svg text { font-family: 'Inter', sans-serif !important; }
        .title       { text-anchor: middle; font-size: 16px; fill: #495057; font-weight: 600; }
        .city        { text-anchor: middle; font-size: 24px; fill: #495057; font-weight: 600; }
        .year        { text-anchor: middle; font-size: 12px; font-weight: 300; fill: #adb5bd; }
        .january     { font-size: 10px; text-anchor: start; font-weight: 300; fill: #adb5bd; }
        .yearLine    { stroke: #dee2e6; }
        .axisText    { fill: #adb5bd; font-size: 10px; font-weight: 300; text-anchor: middle; text-shadow: 0 1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 -1px 0 #fff; }
        .axisCircles { fill: none; stroke: #f0f0f0; stroke-width: 1px; }
        .legendText  { font-size: 10px; font-weight: 400; fill: #6c757d; }
        #radial-loading {
            font-size: 14px;
            color: #6c757d;
            margin-top: 40px;
            text-align: center;
            width: 100%;
        }
        #radial-chart { text-align: center; }
    </style>
</head>
<body>

    <div id="radial-loading">Detecting your location...</div>
    <div id="radial-chart"></div>

    <script>
    var margin = { top: 30, right: 30, bottom: 30, left: 50 },
        width  = 740 - margin.left - margin.right,
        height = 740 - margin.top  - margin.bottom;

    var parseDate   = d3.time.format("%Y-%m-%d").parse;
    var innerRadius = 80,
        outerRadius = 200;

    var colorScale = d3.scale.linear()
        .domain([0, 30])
        .range(["#2c7bb6", "#d7191c"]);

    var barScale = d3.scale.linear()
        .range([innerRadius, outerRadius]);

    var angle = d3.scale.linear()
        .range([-180, 180]);

    function drawRadial(lat, lon, cityName) {
        var year = new Date().getFullYear() - 1;
        var startDate = year + "-01-01";
        var endDate   = year + "-12-31";

        d3.select("#radial-chart").selectAll("*").remove();
        var svg = d3.select("#radial-chart")
            .append("svg")
                .attr("width",  width  + margin.left + margin.right)
                .attr("height", height + margin.top  + margin.bottom)
            .append("g")
                .attr("transform", "translate(" + (margin.left + width / 2) + "," + margin.top + ")");

        svg.append("text")
            .attr("class", "title")
            .attr("x", 0).attr("y", 0)
            .text("Daily Temperature Radial — " + cityName);

        var apiUrl = "https://archive-api.open-meteo.com/v1/archive"
            + "?latitude="   + lat
            + "&longitude="  + lon
            + "&start_date=" + startDate
            + "&end_date="   + endDate
            + "&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean"
            + "&timezone=auto";

        document.getElementById("radial-loading").textContent = "Fetching weather data...";
        document.getElementById("radial-loading").style.display = "block";

        fetch(apiUrl)
            .then(function(r) {
                if (!r.ok) throw new Error("API error " + r.status);
                return r.json();
            })
            .then(function(json) {
                document.getElementById("radial-loading").style.display = "none";

                var daily = json.daily, tempData = [];
                daily.time.forEach(function(t, i) {
                    tempData.push({
                        date:      parseDate(t),
                        min_temp:  daily.temperature_2m_min[i],
                        mean_temp: daily.temperature_2m_mean[i],
                        max_temp:  daily.temperature_2m_max[i]
                    });
                });

                barScale.domain([0, d3.max(tempData, function(d) { return d.max_temp; })]);
                angle.domain(d3.extent(tempData, function(d) { return d.date; }));

                var barWrapper = svg.append("g")
                    .attr("transform", "translate(0," + (outerRadius + 10) + ")");

                var axes = barWrapper.selectAll(".gridCircles")
                    .data([0, 10, 20, 30])
                    .enter().append("g");

                axes.append("circle")
                    .attr("class", "axisCircles")
                    .attr("r", function(d) { return barScale(d); });

                axes.append("text")
                    .attr("class", "axisText")
                    .attr("y", function(d) { return barScale(d); })
                    .attr("dy", "0.3em")
                    .text(function(d) { return d + "°C"; });

                barWrapper.append("text")
                    .attr("class", "city")
                    .attr("x", 0).attr("y", 0)
                    .text(cityName);

                barWrapper.append("text")
                    .attr("class", "year")
                    .attr("x", 0).attr("y", 22)
                    .text(year);

                barWrapper.append("text")
                    .attr("class", "january")
                    .attr("x", 5)
                    .attr("y", -outerRadius * 0.91)
                    .text("Jan");

                barWrapper.append("line")
                    .attr("class", "yearLine")
                    .attr("x1", 0).attr("y1", -innerRadius * 0.9)
                    .attr("x2", 0).attr("y2", -outerRadius * 0.95);

                barWrapper.selectAll(".tempBar")
                    .data(tempData)
                    .enter().append("rect")
                        .attr("class", "tempBar")
                        .attr("transform", function(d) { return "rotate(" + angle(d.date) + ")"; })
                        .attr("width", 1)
                        .attr("height", function(d) { return barScale(d.max_temp) - barScale(d.min_temp); })
                        .attr("x", -0.5)
                        .attr("y", function(d) { return barScale(d.min_temp); })
                        .style("fill", function(d) { return colorScale(d.mean_temp); });

                svg.append("defs")
                    .append("linearGradient")
                        .attr("id", "legendGradient")
                        .attr("x1", "0%").attr("y1", "0%")
                        .attr("x2", "100%").attr("y2", "0%")
                    .selectAll("stop")
                    .data([
                        { offset: "0%",   color: "#2c7bb6" },
                        { offset: "100%", color: "#d7191c" }
                    ])
                    .enter().append("stop")
                        .attr("offset",     function(d) { return d.offset; })
                        .attr("stop-color", function(d) { return d.color; });

                var legendWidth = 300;
                var legendWrapper = svg.append("g")
                    .attr("transform", "translate(0," + (2 * outerRadius + 40) + ")");

                legendWrapper.append("rect")
                    .attr("x", -legendWidth / 2).attr("y", 10)
                    .attr("rx", 4)
                    .attr("width", legendWidth).attr("height", 8)
                    .style("fill", "url(#legendGradient)");

                legendWrapper.selectAll(".legendText")
                    .data([
                        { x: -legendWidth / 2, y: 30, text: "0°C",  anchor: "start"   },
                        { x: 0,                 y: 0,  text: "Average temperature on a day", anchor: "middle" },
                        { x:  legendWidth / 2, y: 30, text: "30°C", anchor: "end"     }
                    ])
                    .enter().append("text")
                        .attr("class", "legendText")
                        .attr("x", function(d) { return d.x; })
                        .attr("y", function(d) { return d.y; })
                        .style("text-anchor", function(d) { return d.anchor; })
                        .text(function(d) { return d.text; });
            })
            .catch(function(err) {
                document.getElementById("radial-loading").textContent = "Error loading weather data: " + err.message;
            });
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                fetch("https://nominatim.openstreetmap.org/reverse?lat=" + lat + "&lon=" + lon + "&format=json")
                    .then(function(r) { return r.json(); })
                    .then(function(geo) {
                        var city = geo.address.city
                                 || geo.address.town
                                 || geo.address.village
                                 || geo.address.county
                                 || "Your Location";
                        drawRadial(lat, lon, city);
                    })
                    .catch(function() {
                        drawRadial(lat, lon, "Your Location");
                    });
            },
            function(err) {
                document.getElementById("radial-loading").textContent =
                    "Could not get your location: " + err.message;
            }
        );
    } else {
        document.getElementById("radial-loading").textContent =
            "Geolocation is not supported by your browser.";
    }
    </script>

</body>
</html>
